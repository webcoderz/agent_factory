[project]
name = "agent-patterns"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.31.0",
    "httpx>=0.28.1",
    "pdf2img>=0.1.2",
    "pydantic>=2.12.5",
]
[project.optional-dependencies]
# Install with: pip install agent-patterns[agent] or uv add "agent-patterns[agent]"
# Use this extra when you want PydanticAIAgentBase and LLMVisionOCREngine.
# If your app already has pydantic-ai (any version), you can omit [agent] and
# the package will use your installed pydantic-ai when you use the agent/vision OCR.
agent = [
    "pydantic-ai>=1.60.0",
]

docs = [
    "python-docx>=1.2.0",
    "python-pptx>=1.0.2",
    "reportlab>=4.4.10",
]